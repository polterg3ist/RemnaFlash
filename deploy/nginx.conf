# /etc/nginx/sites-available/flashlink-webhook
# Замени pay.yourdomain.com на свой домен

server {
    listen 80;
    server_name pay.yourdomain.com;

    # Certbot добавит SSL-блок сюда автоматически
    # Запусти: sudo certbot --nginx -d pay.yourdomain.com

    location /webhook/yookassa {
        proxy_pass         http://127.0.0.1:8000/webhook/yookassa;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }

    # Всё остальное — закрыто
    location / {
        return 444;
    }
}
